version: "3.7"

services:
  db:
    image: docker.io/mysql:8.0.45-debian
    restart: always
    networks:
      slims-net:
        ipv4_address: 172.18.1.3
    container_name: slims-db
    env_file:
      - db_default.env
    volumes:
      - "./dbdata:/var/lib/mysql:Z"
    ports:
      - "3360:3306"

  app01:
    image: chrosvg/slims:9.7.2
    restart: always
    # userns_mode: "keep-id:uid=33,gid=33"
    # userns_mode: keep-id
    networks:
      slims-net:
        ipv4_address: 172.18.1.11
    container_name: slims-app
    ports:
      - "8080:80"
      - "4433:443"
    volumes:
      - "./app:/var/www/html:Z"
      - "./conf/php/php.ini:/usr/local/etc/php/php.ini:Z"
    depends_on:
      - db

  redis:
    image: docker.io/redis:trixie
    restart: always
    networks:
      slims-net:
        ipv4_address: 172.18.1.4
    container_name: slims-redis
    ports:
      - "6380:6379"

networks:
  slims-net:
    name: slims-net
    ipam:
      driver: default
      config:
        - subnet: "172.18.1.0/24"
